
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAILMATRIX</title>
  <style>
    :root {
      --page: #f4f6f8;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --ink: #0f172a;
      --muted: #475569;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --ok: #166534;
      --bad: #be123c;
      --line: #dbe3ea;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--ink);
      background: var(--page);
      min-height: 100vh;
      padding: 24px;
    }

    .layout {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero {
      background: var(--surface);
      color: var(--ink);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 1.95rem);
      font-weight: 700;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      opacity: 1;
    }

    .status {
      margin-top: 10px;
      display: inline-block;
      background: #ecfeff;
      border: 1px solid #b6d9d5;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.84rem;
      color: #0f4b46;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
    }

    label {
      font-size: 0.9rem;
      color: #1e293b;
      font-weight: 600;
    }

    input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #c9d5e2;
      background: #fff;
      color: #0f172a;
      padding: 10px;
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
      transition: background-color 120ms ease;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .ghost {
      background: #334155;
    }

    .ghost:hover {
      background: #1f2937;
    }

    .results {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      border: 1px solid #1e293b;
      min-height: 170px;
      padding: 12px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }

    .msg-ok {
      color: var(--ok);
      font-weight: 600;
    }

    .msg-bad {
      color: var(--bad);
      font-weight: 600;
    }

    .booking-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .booking-item {
      border: 1px solid #d4dee8;
      border-radius: 10px;
      padding: 10px;
      background: #ffffff;
    }

    .booking-item strong {
      color: #0f172a;
    }

    .bookings-panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-alt);
      padding: 12px;
    }

    .rules-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .booking-summary {
      margin-top: 8px;
      border: 1px dashed #b8c7d6;
      border-radius: 8px;
      padding: 8px 10px;
      background: #ffffff;
      color: #0f172a;
      font-size: 0.9rem;
      font-weight: 600;
    }

    @media (min-width: 920px) {
      .board {
        grid-template-columns: 1fr 1fr;
      }

      .row {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="hero">
      <h1 id="appTitle">RAILMATRIX</h1>
      <p>Search trains, create bookings, and view your booking history from a single interface.</p>
      <span id="healthBadge" class="status">Checking server...</span>
    </section>

    <section class="board">
      <article class="card">
        <h2>Search Trains</h2>
        <form id="searchForm" class="stack">
          <div class="row">
            <div>
              <label for="source">Source</label>
              <input id="source" name="source" value="Mumbai" required />
            </div>
            <div>
              <label for="destination">Destination</label>
              <input id="destination" name="destination" value="Pune" required />
            </div>
          </div>
          <button type="submit">Search</button>
        </form>
        <div id="trainResults" class="results" aria-live="polite"></div>
      </article>

      <article class="card">
        <h2>Create Booking</h2>
        <form id="bookingForm" class="stack">
          <div class="row">
            <div>
              <label for="userId">User ID</label>
              <input id="userId" name="userId" type="number" min="1" value="1" required />
            </div>
            <div>
              <label for="trainId">Train ID</label>
              <input id="trainId" name="trainId" type="number" min="1" value="901" required />
            </div>
          </div>
          <div>
            <label for="userName">User Name</label>
            <input id="userName" name="userName" value="Demo User" required />
          </div>
          <div class="row">
            <div>
              <label for="journeyDate">Journey Date</label>
              <input id="journeyDate" name="journeyDate" type="date" required />
            </div>
            <div>
              <label for="seatCount">Seat Count</label>
              <input id="seatCount" name="seatCount" type="number" min="1" max="6" value="1" required />
            </div>
          </div>
          <button type="submit">Book Ticket</button>
          <div id="rulesHint" class="rules-hint"></div>
          <div id="bookingMessage"></div>
        </form>

        <div class="bookings-panel">
          <h2 style="margin-top:0;">My Bookings</h2>
          <div class="row" style="margin-bottom:10px;">
            <div>
              <label for="bookingUserId">User ID For Booking List</label>
              <input id="bookingUserId" name="bookingUserId" type="number" min="1" value="1" required />
            </div>
          </div>
          <button id="loadBookingsBtn" type="button" class="ghost">Load Bookings</button>
          <div id="bookingList" class="booking-list"></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const apiBase = "";

    const healthBadge = document.getElementById("healthBadge");
    const trainResults = document.getElementById("trainResults");
    const bookingMessage = document.getElementById("bookingMessage");
    const bookingList = document.getElementById("bookingList");
    const rulesHint = document.getElementById("rulesHint");
    const appTitle = document.getElementById("appTitle");

    let meta = {
      appName: "RAILMATRIX",
      serverDate: new Date().toISOString().slice(0, 10),
      bookingRules: {
        minSeatsPerBooking: 1,
        maxSeatsPerBooking: 6,
        maxSeatsPerTrainPerDay: 120
      }
    };

    function safeText(value, fallback = "N/A") {
      if (value === null || value === undefined) {
        return fallback;
      }
      const str = String(value).trim();
      return str.length === 0 ? fallback : str;
    }

    function applyMetaToUi() {
      const rules = meta.bookingRules || {};
      const minSeats = Number.isInteger(rules.minSeatsPerBooking) ? rules.minSeatsPerBooking : 1;
      const maxSeats = Number.isInteger(rules.maxSeatsPerBooking) ? rules.maxSeatsPerBooking : 6;
      const maxPerTrain = Number.isInteger(rules.maxSeatsPerTrainPerDay) ? rules.maxSeatsPerTrainPerDay : 120;

      const seatInput = document.getElementById("seatCount");
      seatInput.min = String(minSeats);
      seatInput.max = String(maxSeats);
      if (!seatInput.value || Number(seatInput.value) < minSeats) {
        seatInput.value = String(minSeats);
      }

      const journeyDateInput = document.getElementById("journeyDate");
      journeyDateInput.min = safeText(meta.serverDate, new Date().toISOString().slice(0, 10));
      if (!journeyDateInput.value) {
        journeyDateInput.value = journeyDateInput.min;
      }

      appTitle.textContent = safeText(meta.appName, "RAILMATRIX");
      document.title = safeText(meta.appName, "RAILMATRIX");

      rulesHint.textContent = `Rules from Java backend: seats per booking ${minSeats}-${maxSeats}, max ${maxPerTrain} seats per train/day. Server date: ${journeyDateInput.min}.`;
    }

    async function loadMeta() {
      try {
        const res = await fetch(`${apiBase}/api/meta`);
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to load backend metadata");
        }
        meta = {
          ...meta,
          ...data,
          bookingRules: {
            ...meta.bookingRules,
            ...(data.bookingRules || {})
          }
        };
      } catch (error) {
        // Keep defaults when metadata endpoint is temporarily unavailable.
      }
      applyMetaToUi();
    }

    function renderTrainResponse(data) {
      const direct = data.direct || [];
      const connecting = data.connecting || [];
      const source = safeText(data.source, "Unknown Source");
      const destination = safeText(data.destination, "Unknown Destination");

      const lines = [];
      lines.push(`Results for: ${source} -> ${destination}`);
      lines.push("");
      lines.push("--- Direct Trains ---");
      if (direct.length === 0) {
        lines.push("No Direct Trains Found.");
      } else {
        direct.forEach((t) => lines.push(`Train ID: ${t.trainId} | ${t.trainName}`));
      }

      lines.push("");
      lines.push("--- Connecting Trains ---");
      if (connecting.length === 0) {
        lines.push("No Connecting Trains Found.");
      } else {
        connecting.forEach((c, index) => {
          const junction = safeText(c.junction, "Unknown Junction");
          lines.push(`Option ${index + 1}: ${source} -> ${junction} -> ${destination}`);
          lines.push(`Trains: ${safeText(c.firstTrain)} -> ${safeText(c.secondTrain)}`);
        });
      }

      trainResults.textContent = lines.join("\n");
    }

    async function checkHealth() {
      try {
        const res = await fetch(`${apiBase}/api/health`);
        if (!res.ok) {
          throw new Error("Server not healthy");
        }
        healthBadge.textContent = "Backend connected on :8080";
      } catch (error) {
        healthBadge.textContent = "Backend not reachable. Start Java server first.";
      }
    }

    document.getElementById("searchForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const source = document.getElementById("source").value.trim();
      const destination = document.getElementById("destination").value.trim();

      trainResults.textContent = "Searching trains...";

      try {
        const url = `${apiBase}/api/trains?source=${encodeURIComponent(source)}&destination=${encodeURIComponent(destination)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Search failed");
        }
        renderTrainResponse(data);
      } catch (error) {
        trainResults.textContent = `Error: ${error.message}`;
      }
    });

    document.getElementById("bookingForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        userId: Number(document.getElementById("userId").value),
        userName: document.getElementById("userName").value.trim(),
        trainId: Number(document.getElementById("trainId").value),
        journeyDate: document.getElementById("journeyDate").value,
        seatCount: Number(document.getElementById("seatCount").value)
      };

      if (!Number.isInteger(payload.userId) || payload.userId <= 0 || !Number.isInteger(payload.trainId) || payload.trainId <= 0) {
        bookingMessage.className = "msg-bad";
        bookingMessage.textContent = "User ID and Train ID must be positive numbers.";
        return;
      }

      bookingMessage.className = "";
      bookingMessage.textContent = "Creating booking...";

      try {
        const res = await fetch(`${apiBase}/api/bookings`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          let details = data.error || "Booking failed";
          if (typeof data.availableSeats === "number") {
            details += ` (Available seats: ${data.availableSeats})`;
          }
          throw new Error(details);
        }

        bookingMessage.className = "msg-ok";
        bookingMessage.innerHTML =
          `Booking successful. Booking ID: ${safeText(data.bookingId)} | ` +
          `Train ID: ${safeText(data.trainId)} (${safeText(data.trainName)}) | ` +
          `${safeText(data.source)} -> ${safeText(data.destination)}<br>` +
          `Fare: ${safeText(data.fare)} | Booking Date: ${safeText(data.bookingDate)} | ` +
          `Status: ${safeText(data.status)} | Total Bookings: ${safeText(data.totalBookings)}`;
      } catch (error) {
        bookingMessage.className = "msg-bad";
        bookingMessage.textContent = `Error: ${error.message}`;
      }
    });

    document.getElementById("loadBookingsBtn").addEventListener("click", async () => {
      bookingList.innerHTML = "<div>Loading bookings...</div>";
      try {
        const currentUserId = Number(document.getElementById("bookingUserId").value);
        if (!Number.isInteger(currentUserId) || currentUserId <= 0) {
          bookingList.innerHTML = "<div class=\"msg-bad\">Enter a valid User ID to load your bookings.</div>";
          return;
        }
        const url = `${apiBase}/api/bookings?userId=${currentUserId}`;

        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to load bookings");
        }

        const rows = data.bookings || [];
        if (rows.length === 0) {
          bookingList.innerHTML = `<div class="booking-summary">Total Bookings: ${safeText(data.totalBookings, "0")}</div><div>No bookings found.</div>`;
          return;
        }

        bookingList.innerHTML = `<div class="booking-summary">Total Bookings: ${safeText(data.totalBookings, String(rows.length))}</div>`;
        rows.forEach((row) => {
          const card = document.createElement("div");
          card.className = "booking-item";
          const trainLabel = Number(row.trainId) > 0
            ? `${safeText(row.trainName)} (ID ${safeText(row.trainId)})`
            : `${safeText(row.trainName)}`;
          card.innerHTML =
            `<strong>Booking #${row.bookingId}</strong><br>` +
            `User: ${row.userName} (ID ${row.userId})<br>` +
            `Train: ${trainLabel}<br>` +
            `Route: ${safeText(row.source)} -> ${safeText(row.destination)}<br>` +
            `Journey: ${safeText(row.journeyDate)} | Booking Date: ${safeText(row.bookingDate)}<br>` +
            `Seats: ${safeText(row.seatCount)} | Status: ${safeText(row.status)}`;
          bookingList.appendChild(card);
        });
      } catch (error) {
        bookingList.innerHTML = `<div class="msg-bad">Error: ${error.message}</div>`;
      }
    });

    loadMeta();
    checkHealth();
  </script>
</body>
</html>
